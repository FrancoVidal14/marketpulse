spring:
  application:
    name: core-api

  datasource:
    url: jdbc:postgresql://localhost:5432/marketpulse
    username: marketpulse
    password: marketpulse

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus